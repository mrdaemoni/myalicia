name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal deps for syntax check
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Compile every Python file
        run: |
          set -e
          find myalicia -name '*.py' -print0 | xargs -0 -n1 python -m py_compile

      - name: Verify config layer loads
        run: python -c "import sys; sys.path.insert(0, '.'); from myalicia.config import config; print(config.user.name)"

      - name: Verify CLI imports
        run: python -c "import sys; sys.path.insert(0, '.'); from myalicia import cli; cli.build_parser()"

  personal-data-scan:
    name: No personal data leaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan public files for original-codebase references
        run: |
          set -e
          # Anything matching these patterns in public files is a regression
          # from the original sanitization pass.
          PATTERNS='/Users/alicia/Documents/mrhector-alicia|\bHector\b|\bmrhector\b|alicia\.luz\.granada'
          ! git ls-files | xargs -I{} grep -lE "$PATTERNS" {} 2>/dev/null
