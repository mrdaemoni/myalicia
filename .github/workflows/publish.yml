name: Publish to PyPI

# Auto-publishes to PyPI when a version tag is pushed (e.g., v0.1.0, v0.2.0).
# Uses PyPI's "Trusted Publisher" OIDC flow — no API token stored in the repo.
#
# One-time setup (do this BEFORE pushing your first tag):
#
#   1. Go to https://pypi.org and create an account (if you don't have one).
#   2. Visit https://pypi.org/manage/account/publishing/
#   3. Click "Add a new pending publisher" and fill in:
#        - PyPI project name:   myalicia
#        - Owner:               mrdaemoni
#        - Repository name:     myalicia
#        - Workflow name:       publish.yml
#        - Environment name:    pypi
#   4. Click "Add"
#
# After setup, publish a release with:
#
#   git tag v0.1.0
#   git push --tags
#
# This workflow then runs, builds the package, and uploads to PyPI.
# After ~30 seconds, `pip install myalicia` works for everyone.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write   # Required for PyPI Trusted Publisher OIDC

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/myalicia
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` field — Trusted Publisher OIDC handles auth automatically.

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            dist/* \
            --title "myalicia ${GITHUB_REF#refs/tags/}" \
            --notes "See [CHANGELOG.md](https://github.com/mrdaemoni/myalicia/blob/main/CHANGELOG.md) for details."
